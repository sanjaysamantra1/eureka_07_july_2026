<script>
    let arr = [10, 20, 30, 40, 50, 10, 20, 30, 40, 50, 10, 50, 10, 40];
    // remove the duplicates
    let uniqueSet = new Set(arr);
    console.log(uniqueSet); // Set(5) {10, 20, 30, 40, 50}

    let uniqueArr = [...uniqueSet];
    console.log(uniqueArr); // [10, 20, 30, 40, 50]
</script>
