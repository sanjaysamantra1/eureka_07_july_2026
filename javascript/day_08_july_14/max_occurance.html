<script>
    let str = 'Hello World';
    let charMap = {};

    let maxChar = '';
    let maxCount = 0;

    for (char of str) {
        charMap[char] = charMap[char] ? charMap[char] + 1 : 1;
        let charCount = charMap[char];
        if (charCount > maxCount) {
            maxChar = char;
            maxCount = charCount;
        }
    }
    console.log(charMap)
    console.log(`Character ${maxChar} is seen Max time with count ${maxCount}`)
</script>
