<script>
    let str = 'This is Javascript class';

    console.log(str.slice(8));      // start=8 end=No
    console.log(str.substring(8));  // start=8 end=No

    console.log(str.slice(8, 12));      // start=8 end=12
    console.log(str.substring(8, 12));  // start=8 end=12
    console.log(str.substr(8, 12));     // start=8 , print next 12 characters

    console.log(str.slice(8, -1));      // start=8 end=-1
    console.log(str.substring(8,-1));  // start=8 end=-1

    // substring() cannot accept negative indexes. slice() does.
</script>
