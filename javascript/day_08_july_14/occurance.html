<script>
    /*
    Print the occurence of each character in a string
    input: 'entertainment'
    output: { e: 3, n: 2, t: 3 ....}
     
    1. Create an empty HashMap to store each character and its count.
    2. Go through the string one character at a time.
    3. Check if the current character is already present in the HashMap.
        Yes : If it is present, increase its count by 1.
        No : If it is not present, add the character to the HashMap with a count of 1.
    4. After processing all characters, print the hashMap. 
    */
    let str = 'entertainment';
    let charMap = {};
    for (char of str) {
        if (charMap[char]) {
            charMap[char] = charMap[char] + 1;
        } else {
            charMap[char] = 1;
        }
    }
    console.log(charMap)
</script>
