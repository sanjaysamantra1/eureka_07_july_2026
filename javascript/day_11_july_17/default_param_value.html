<script>
    function add(a, b, c) {
        console.log(a + b + c);
    }
    add(10, 20);  // 10 + 20 + undefine     NaN

    // ES_5
    function sum(a, b, c) {
        a = a || 0;
        b = b || 0;
        c = c || 0;
        console.log(a + b + c);
    }
    sum(10, 20);  // 10 + 20 + 0

    // ES_6 
    function addition(a, b, c = 0) {
        console.log(a + b + c);
    }
    addition(10, 20);  // 10 + 20 + 0
    addition(10, 20, 30);  // 10 + 20 + 30
    addition(10, 20, 30, 40, 50);  // 10 + 20 + 30
</script>
