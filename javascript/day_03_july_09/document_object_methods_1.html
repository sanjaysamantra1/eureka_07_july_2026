<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1 id="heading1">Hello, Lets Learn Document Object</h1>

    <h2>I am Heading without any Id</h2>
    <h2>I am another Heading without any Id</h2>

    <script>
        let message = 'Hello, Good Morning!!!';
        document.write(message);

        document.getElementById('heading1').style.color = 'red';

        document.querySelector('h2').style.color = 'blue';
    </script>
</body>

</html>
