<script>
    let arr1 = [10, 50, 30, 20, 40];
    arr1.sort();
    console.log(arr1);

    let arr2 = [9, 101, 102, 91, 92, 72, 75, 5, 4, 6, 8, 103, 108];
    arr2.sort(); // string sort
    console.log(arr2);

    // numeric sort
    arr2.sort((a, b) => a - b); // asc
    console.log(arr2)
</script>
