<!DOCTYPE html>
<html lang="en">

<head>

</head>

<body>
    <h1>Lets Check if a number is Even or Odd</h1>

    <script>
        let num = 5;
        if (num % 2 == 0) {
            console.log(num + ' is Even')
        } else {
            console.log(num + ' is Odd')
        }
    </script>
</body>
