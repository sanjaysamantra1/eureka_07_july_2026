<script>
    console.log('Global Code starts...');
    console.log(`a is ${a}`);  // a is undefined , Hoisting
    // console.log(`b is ${b}`);  // ReferenceError: Cannot access 'b' before initialization
    // console.log(`c is ${c}`);  // ReferenceError: Cannot access 'b' before initialization
    var a = 10;
    let b = 20;
    const c = 30;
    console.log(`a is ${a}`);
    console.log(`b is ${b}`);
    console.log(`c is ${c}`);
    console.log('Global Code ends...')
</script>
